name: openenv-code-review
description: >
  Multi-agent code refinement arena for long-horizon RL with objective,
  verifiable rewards from compile/test/diff checks.
version: 1.0.0
tags:
  - openenv
  - code-review
  - evaluation
entrypoint: backend.api.main:app

api:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  baseline: /baseline

actions:
  model: MultiAgentAction
  fields:
    - name: reviewer_issues
      type: list
      required: false
    - name: fixed_code
      type: string
      required: true

observations:
  model: MultiStepObservation
  fields:
    - name: task_id
      type: string
    - name: title
      type: string
    - name: instruction
      type: string
    - name: buggy_code
      type: string
    - name: current_code
      type: string
    - name: step_count
      type: integer
    - name: max_steps
      type: integer
    - name: previous_step_output
      type: object
    - name: tests_passed
      type: integer
    - name: tests_total
      type: integer

reward:
  model: VerifiableReward
  type: float
  range: [-2.0, 2.0]

tasks:
  - task_id: arena-001
    difficulty: easy
  - task_id: arena-002
    difficulty: easy
  - task_id: arena-003
    difficulty: easy
  - task_id: arena-004
    difficulty: easy
  - task_id: arena-005
    difficulty: easy
  - task_id: arena-006
    difficulty: easy
  - task_id: arena-007
    difficulty: easy
  - task_id: arena-008
    difficulty: easy
